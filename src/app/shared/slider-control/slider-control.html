<div class="flex justify-between items-baseline mb-[10px]">
  <label class="flex items-center gap-[5px] text-[0.78rem] font-medium text-tx-muted">
    {{ label }}
    <app-info-badge [tip]="tip" />
  </label>
  <span class="font-mono text-[0.88rem] font-medium text-tx tracking-[-0.01em]">{{ readout }}</span>
</div>
<input
  type="range"
  class="slider"
  [min]="min"
  [max]="max"
  [step]="step"
  [value]="value"
  (input)="onInput($event)"
  [style.--pct]="pct"
/>
<div class="flex justify-between mt-[6px] font-mono text-[0.6rem] text-tx-dim">
  <span>{{ minLabel }}</span>
  <span>{{ maxLabel }}</span>
</div>
