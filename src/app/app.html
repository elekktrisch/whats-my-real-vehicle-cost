<div class="app-shell">

  <header class="app-header">
    <div class="header-brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
      <span class="brand-name">WhatsMyVehicleCost</span>
    </div>
    <span class="header-tag">Vehicle Finance Calculator</span>
  </header>

  <nav class="mode-nav">
    <button class="mode-btn" [class.active]="activeTab === 'lease'" (click)="activeTab = 'lease'">
      <span class="mode-dot"></span>Lease
    </button>
    <button class="mode-btn" [class.active]="activeTab === 'financing'" (click)="activeTab = 'financing'">
      <span class="mode-dot"></span>Finance
    </button>
    <button class="mode-btn" [class.active]="activeTab === 'cash'" (click)="activeTab = 'cash'">
      <span class="mode-dot"></span>Cash
    </button>
  </nav>

  @if (activeTab === 'lease') {
    <app-lease-tab />
  }

  @if (activeTab === 'financing') {
    <div class="coming-soon">
      <svg class="coming-soon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <div class="coming-soon-title">Financing Calculator</div>
      <div class="coming-soon-sub">Coming soon</div>
    </div>
  }

  @if (activeTab === 'cash') {
    <div class="coming-soon">
      <svg class="coming-soon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
        <line x1="1" y1="10" x2="23" y2="10"/>
      </svg>
      <div class="coming-soon-title">Cash Purchase Calculator</div>
      <div class="coming-soon-sub">Coming soon</div>
    </div>
  }

</div>
