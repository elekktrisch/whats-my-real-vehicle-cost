<div class="grid grid-cols-[320px_1fr] gap-5 items-start">

  <aside class="bg-surface border border-border rounded-[14px] py-[22px] px-5 sticky top-6">
    <div class="font-ui text-[0.62rem] font-medium tracking-[0.15em] uppercase text-tx-dim pb-[14px] mb-5 border-b border-border">
      Parameters
    </div>

    <app-slider-control
      label="Starting Price"
      tip="The negotiated purchase price of the car before any down payment is applied. Also called the gross capitalized cost."
      [min]="5000" [max]="150000" [step]="100"
      minLabel="$5k" maxLabel="$150k"
      [readout]="'$' + (capitalizedCosts | number:'1.0-0')"
      [value]="capitalizedCosts"
      (valueChange)="capitalizedCosts = $event; scheduleUpdate()"
    />

    <app-slider-control
      label="Down Payment"
      tip="Cash paid upfront to reduce the net amount financed. Subtracts directly from the Starting Price to give the Adjusted Cap Cost."
      [min]="0" [max]="50000" [step]="100"
      minLabel="$0" maxLabel="$50k"
      [readout]="'$' + (downPayment | number:'1.0-0')"
      [value]="downPayment"
      (valueChange)="downPayment = $event; scheduleUpdate()"
    />

    <app-slider-control
      label="Residual Value"
      tip="The estimated value of the car at the end of the lease, set by the leasing company. A higher residual value means lower monthly payments."
      [min]="0" [max]="100000" [step]="100"
      minLabel="$0" maxLabel="$100k"
      [readout]="'$' + (residualPrice | number:'1.0-0')"
      [value]="residualPrice"
      (valueChange)="residualPrice = $event; scheduleUpdate()"
    />

    <app-slider-control
      label="Interest Rate"
      tip="The annual percentage rate (APR) charged on the lease. Divide by 2400 to get the money factor used in lease calculations."
      [min]="0" [max]="20" [step]="0.01"
      minLabel="0%" maxLabel="20%"
      [readout]="(apr | number:'1.2-2') + '%'"
      [value]="apr"
      (valueChange)="apr = $event; scheduleUpdate()"
    />

    <app-slider-control
      label="Lease Term"
      tip="How long the lease runs in months. Common terms are 24, 36, 48, or 60 months. Longer leases lower monthly payments but increase total interest paid."
      [min]="12" [max]="84" [step]="1"
      minLabel="12 mo" maxLabel="84 mo"
      [readout]="months + ' mo'"
      [value]="months"
      (valueChange)="months = $event; scheduleUpdate()"
    />

    <div class="grid grid-cols-2 gap-[10px] mt-[22px] pt-[18px] border-t border-border">
      <div class="flex flex-col gap-[5px]">
        <span class="text-[0.62rem] font-medium tracking-[0.07em] uppercase text-tx-dim">Starting Price</span>
        <input type="number" class="num-input bg-elevated border border-border rounded-[7px] py-[7px] px-[10px] text-tx font-mono text-[0.8rem] outline-none w-full transition-[border-color,box-shadow] duration-150 focus:border-accent focus:shadow-[0_0_0_3px_var(--color-accent-soft)]"
               [(ngModel)]="capitalizedCosts" (input)="scheduleUpdate()" />
      </div>
      <div class="flex flex-col gap-[5px]">
        <span class="text-[0.62rem] font-medium tracking-[0.07em] uppercase text-tx-dim">Down Payment</span>
        <input type="number" class="num-input bg-elevated border border-border rounded-[7px] py-[7px] px-[10px] text-tx font-mono text-[0.8rem] outline-none w-full transition-[border-color,box-shadow] duration-150 focus:border-accent focus:shadow-[0_0_0_3px_var(--color-accent-soft)]"
               [(ngModel)]="downPayment" (input)="scheduleUpdate()" />
      </div>
      <div class="flex flex-col gap-[5px]">
        <span class="text-[0.62rem] font-medium tracking-[0.07em] uppercase text-tx-dim">Residual Value</span>
        <input type="number" class="num-input bg-elevated border border-border rounded-[7px] py-[7px] px-[10px] text-tx font-mono text-[0.8rem] outline-none w-full transition-[border-color,box-shadow] duration-150 focus:border-accent focus:shadow-[0_0_0_3px_var(--color-accent-soft)]"
               [(ngModel)]="residualPrice" (input)="scheduleUpdate()" />
      </div>
      <div class="flex flex-col gap-[5px]">
        <span class="text-[0.62rem] font-medium tracking-[0.07em] uppercase text-tx-dim">APR %</span>
        <input type="number" class="num-input bg-elevated border border-border rounded-[7px] py-[7px] px-[10px] text-tx font-mono text-[0.8rem] outline-none w-full transition-[border-color,box-shadow] duration-150 focus:border-accent focus:shadow-[0_0_0_3px_var(--color-accent-soft)]"
               [(ngModel)]="apr" (input)="scheduleUpdate()" />
      </div>
      <div class="flex flex-col gap-[5px]">
        <span class="text-[0.62rem] font-medium tracking-[0.07em] uppercase text-tx-dim">Months</span>
        <input type="number" class="num-input bg-elevated border border-border rounded-[7px] py-[7px] px-[10px] text-tx font-mono text-[0.8rem] outline-none w-full transition-[border-color,box-shadow] duration-150 focus:border-accent focus:shadow-[0_0_0_3px_var(--color-accent-soft)]"
               [(ngModel)]="months" (input)="scheduleUpdate()" />
      </div>
    </div>
  </aside>

  <main class="flex flex-col gap-[14px]">

    <div class="hero-card border border-[rgba(79,142,247,0.18)] rounded-2xl px-[38px] pt-[34px] pb-[30px] relative overflow-hidden [background:linear-gradient(140deg,#0c1a30_0%,#08101f_100%)]">
      <div class="font-ui text-[0.65rem] font-medium tracking-[0.16em] uppercase text-accent mb-[10px]">Monthly Payment</div>
      <div class="flex items-baseline gap-[5px] mb-3 relative z-[1]">
        <span class="font-mono text-[2.4rem] font-medium text-tx-muted leading-none">$</span>
        <span class="font-mono text-[5rem] font-medium text-tx leading-none tracking-[-0.03em]">{{monthlyPayment | number:'1.2-2'}}</span>
      </div>
      <div class="font-ui text-[0.68rem] text-tx-dim tracking-[0.07em] uppercase relative z-[1]">
        {{months}}-month lease &nbsp;·&nbsp; {{apr | number:'1.2-2'}}% APR
      </div>
    </div>

    <div class="grid grid-cols-4 gap-[10px]">
      <app-kpi-card
        label="Adj. Cap Cost"
        tip="Starting Price minus your down payment. This is the net amount the lease is calculated on."
        [value]="'$' + (adjustedCapCost | number:'1.0-0')"
      />
      <app-kpi-card
        label="Money Factor"
        tip="The interest rate expressed as a small decimal (APR ÷ 2400). Multiply by 2400 to convert back to an APR percentage."
        [value]="(moneyFactor | number:'1.0-6') ?? ''"
      />
      <app-kpi-card
        label="Depreciation / mo"
        tip="The monthly portion of the car's value you pay for. Calculated as (Adjusted Cap Cost − Residual Price) ÷ Months."
        [value]="'$' + (depreciationFee | number:'1.2-2')"
      />
      <app-kpi-card
        label="Finance Fee / mo"
        tip="The monthly interest charge. Calculated as Starting Price × Money Factor. Also called the rent charge."
        [value]="'$' + (financeFee | number:'1.2-2')"
      />
    </div>

    <div class="bg-surface border border-border rounded-xl pt-[22px] px-[22px] pb-4">
      <div class="flex items-center justify-between mb-[18px]">
        <span class="font-ui text-[0.62rem] font-medium tracking-[0.13em] uppercase text-tx-dim">Lease Debt vs. Vehicle Value</span>
        <div class="flex gap-4">
          <span class="flex items-center gap-[6px] font-ui text-[0.62rem] text-tx-muted tracking-[0.04em]">
            <span class="w-5 h-0.5 rounded-sm inline-block" style="background:#f4845f"></span>Lease Debt
          </span>
          <span class="flex items-center gap-[6px] font-ui text-[0.62rem] text-tx-muted tracking-[0.04em]">
            <span class="w-5 h-0.5 rounded-sm inline-block" style="background:#4f8ef7"></span>Vehicle Value
          </span>
        </div>
      </div>
      <canvas baseChart [data]="chartData" [type]="'line'" [options]="chartOptions"></canvas>
    </div>

  </main>
</div>
