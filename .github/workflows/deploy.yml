# Build the Angular app and deploy it to GitHub Pages.
name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ─── Job 1: type-check + Karma unit tests ────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20 (with npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Type check (TypeScript no-emit)
        run: npx tsc --noEmit -p tsconfig.json

      - name: Run Karma unit tests
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Summary
        if: always()
        run: echo "✅ Unit tests phase complete." >> "$GITHUB_STEP_SUMMARY"

  # ─── Job 2: Playwright happy-case e2e (runs in parallel with unit-tests) ─
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20 (with npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright Chromium browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e suite
        run: npm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Summary
        if: always()
        run: echo "✅ E2E tests phase complete." >> "$GITHUB_STEP_SUMMARY"

  # ─── Job 3: production build, SPA fallback, bundle artifact ──────────────
  build:
    name: Build
    needs: [unit-tests, e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20 (with npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      # Repo is served at https://<owner>.github.io/whats-my-real-vehicle-cost/
      # so the base href has to match — otherwise asset URLs 404.
      - name: Build production bundle
        run: npm run build -- --base-href=/whats-my-real-vehicle-cost/

      # GitHub Pages serves the requested path verbatim. SPA routes like /lease
      # would 404 on hard reload; copying index.html → 404.html lets GitHub
      # serve our app for any unknown path and Angular's router takes over.
      - name: Generate SPA 404 fallback
        run: cp dist/car-leasing-chart/browser/index.html dist/car-leasing-chart/browser/404.html

      - name: Report bundle size
        run: |
          echo "### 📦 Bundle output" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          du -sh dist/car-leasing-chart/browser >> "$GITHUB_STEP_SUMMARY"
          ls -lh dist/car-leasing-chart/browser/*.js dist/car-leasing-chart/browser/*.css 2>/dev/null | awk '{ printf "%-12s  %s\n", $5, $NF }' >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/car-leasing-chart/browser

  # ─── Job 4: publish to GitHub Pages ──────────────────────────────────────
  deploy:
    name: Deploy
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Live URL
        if: always()
        run: |
          echo "### 🚀 Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
